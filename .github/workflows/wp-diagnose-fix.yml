name: WP Diagnose and Fix

on:
  workflow_dispatch:

jobs:
  diagnose-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check error log and fix .htaccess
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, requests, sys, json
          requests.packages.urllib3.disable_warnings()

          host  = "srvc03.trwww.com"
          user  = os.environ["CPANEL_USER"]
          token = os.environ["CPANEL_TOKEN"]
          headers = {"Authorization": f"cpanel {user}:{token}"}

          def uapi(module, func, params=None):
              resp = requests.post(
                  f"https://{host}:2083/execute/{module}/{func}",
                  headers=headers,
                  data=params or {},
                  verify=False, timeout=30,
              )
              return resp.json()

          # --- 1. PHP Error Log (last 100 lines) ---
          print("=" * 60)
          print("PHP ERROR LOG")
          print("=" * 60)
          r = uapi("Fileman", "show_file_content", {
              "dir": "public_html",
              "file": ".php_error_log",
          })
          if r.get("status") == 1:
              content = r.get("data", {}).get("content", "")
              lines = content.strip().split("\n")
              print("\n".join(lines[-100:]))
          else:
              # Try alternative error log names
              for logfile in ["error_log", "php_error.log", "php-error.log"]:
                  r2 = uapi("Fileman", "show_file_content", {
                      "dir": "public_html",
                      "file": logfile,
                  })
                  if r2.get("status") == 1:
                      content = r2.get("data", {}).get("content", "")
                      lines = content.strip().split("\n")
                      print(f"Found in {logfile}:")
                      print("\n".join(lines[-100:]))
                      break
              else:
                  print(f"Error log not found: {r.get('errors')}")

          # --- 2. Read current .htaccess ---
          print("\n" + "=" * 60)
          print(".HTACCESS CURRENT CONTENT")
          print("=" * 60)
          r = uapi("Fileman", "show_file_content", {
              "dir": "public_html",
              "file": ".htaccess",
          })
          if r.get("status") == 1:
              print(r["data"]["content"])
          else:
              print(f"Could not read .htaccess: {r.get('errors')}")

          # --- 3. Rename .htaccess → .htaccess_backup ---
          print("\n" + "=" * 60)
          print("RENAMING .htaccess TO .htaccess_backup")
          print("=" * 60)
          r = uapi("Fileman", "rename", {
              "sourcefiles": ".htaccess",
              "destfiles":   ".htaccess_backup",
              "dir":         "public_html",
          })
          if r.get("status") == 1:
              print("✓ .htaccess renamed to .htaccess_backup")
          else:
              print(f"Rename result: {r.get('errors')} (may already be backed up)")

          # --- 4. Create fresh WordPress .htaccess ---
          print("\n" + "=" * 60)
          print("CREATING FRESH .htaccess")
          print("=" * 60)
          htaccess_content = """# BEGIN WordPress
<IfModule mod_rewrite.c>
RewriteEngine On
RewriteBase /
RewriteRule ^index\\.php$ - [L]
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule . /index.php [L]
</IfModule>
# END WordPress
"""
          r = uapi("Fileman", "save_file_content", {
              "dir":     "public_html",
              "file":    ".htaccess",
              "content": htaccess_content,
          })
          if r.get("status") == 1:
              print("✓ Fresh .htaccess created")
          else:
              print(f"✗ Could not create .htaccess: {r.get('errors')}")

          # --- 5. Check wp-config.php exists ---
          print("\n" + "=" * 60)
          print("WP-CONFIG CHECK")
          print("=" * 60)
          r = uapi("Fileman", "get_file_information", {
              "path": "public_html/wp-config.php",
          })
          if r.get("status") == 1:
              info = r.get("data", [{}])
              if isinstance(info, list) and info:
                  info = info[0]
              print(f"wp-config.php: exists, size={info.get('size')} bytes, perms={info.get('nicemode')}")
          else:
              print(f"wp-config.php check: {r.get('errors')}")

          # --- 6. List plugins directory ---
          print("\n" + "=" * 60)
          print("PLUGINS DIRECTORY")
          print("=" * 60)
          r = uapi("Fileman", "list_files", {
              "dir": "public_html/wp-content/plugins",
          })
          if r.get("status") == 1:
              for f in r.get("data", []):
                  print(f"  {f.get('type','')} {f.get('file','')} ({f.get('size','')} bytes)")
          else:
              print(f"Could not list plugins: {r.get('errors')}")

          print("\n✅ Diagnosis complete.")
          EOF
