name: WP Diagnose and Fix

on:
  workflow_dispatch:

jobs:
  diagnose-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read htaccess, error log and fix via cPanel API
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
        run: python3 .github/scripts/cpanel-diagnose.py
