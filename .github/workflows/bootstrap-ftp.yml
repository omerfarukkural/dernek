name: Bootstrap Plugin via FTP

on:
  workflow_dispatch:

jobs:
  ftp-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload plugin files via cPanel API Token
        run: |
          HOST="srvc03.trwww.com"
          USER="${{ secrets.CPANEL_USER }}"
          TOKEN="${{ secrets.CPANEL_TOKEN }}"
          BASE_DIR="/public_html/wp-content/plugins/dernek-project-sync"

          upload_file() {
            local src="$1"
            local dest_dir="$2"
            local filename=$(basename "$src")
            local content
            content=$(cat "$src")

            echo "Uploading: $filename -> $dest_dir"
            response=$(curl -sk \
              -H "Authorization: cpanel $USER:$TOKEN" \
              "https://$HOST:2083/execute/Fileman/save_file_content" \
              --data-urlencode "dir=$dest_dir" \
              --data-urlencode "filename=$filename" \
              --data-urlencode "content=$content")

            echo "$response"
            if echo "$response" | grep -q '"status":1'; then
              echo "✓ $filename"
            else
              echo "✗ FAILED: $filename"
              exit 1
            fi
          }

          upload_file "wordpress-plugin/dernek-project-sync.php"                      "$BASE_DIR"
          upload_file "wordpress-plugin/includes/class-rest-api.php"                  "$BASE_DIR/includes"
          upload_file "wordpress-plugin/includes/class-post-type.php"                 "$BASE_DIR/includes"
          upload_file "wordpress-plugin/includes/class-admin-widget.php"              "$BASE_DIR/includes"
          upload_file "wordpress-plugin/includes/class-social-scheduler.php"          "$BASE_DIR/includes"
          upload_file "wordpress-plugin/includes/class-content-pipeline.php"          "$BASE_DIR/includes"
          upload_file "wordpress-plugin/includes/class-notebooklm-bridge.php"         "$BASE_DIR/includes"
          upload_file "wordpress-plugin/public/shortcode.php"                         "$BASE_DIR/public"

          echo "All files uploaded successfully!"
