name: Bootstrap Plugin via FTP

on:
  workflow_dispatch:

jobs:
  ftp-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload installer and execute via HTTP
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, requests, sys
          requests.packages.urllib3.disable_warnings()

          host    = "srvc03.trwww.com"
          user    = os.environ["CPANEL_USER"]
          token   = os.environ["CPANEL_TOKEN"]
          headers = {"Authorization": f"cpanel {user}:{token}"}

          # 1. Upload the PHP installer to public_html (this dir always exists)
          with open("wordpress-plugin/dernek-installer.php", "r", encoding="utf-8") as f:
              installer_content = f.read()

          print("Uploading installer script...")
          r = requests.post(
              f"https://{host}:2083/execute/Fileman/save_file_content",
              headers=headers,
              data={
                  "dir":     "public_html",
                  "file":    "dernek-installer.php",
                  "content": installer_content,
              },
              verify=False, timeout=60,
          )
          j = r.json()
          if j.get("status") != 1:
              print(f"✗ Upload failed: {j.get('errors')}")
              sys.exit(1)
          print("✓ Installer uploaded to public_html/dernek-installer.php")

          # 2. Execute it via HTTP
          print("Executing installer...")
          r2 = requests.get(
              "https://bitebimuv.org/dernek-installer.php?run=1",
              timeout=60, verify=True,
          )
          print(f"HTTP {r2.status_code}")
          print(r2.text[:3000])

          if "SUCCESS" in r2.text:
              print("\n✅ Plugin installed successfully!")
          elif r2.status_code == 404:
              print("✗ Installer not found (upload may have failed or 503 blocks PHP)")
              sys.exit(1)
          else:
              print("⚠ Check output above for errors")
              sys.exit(1)
          EOF
