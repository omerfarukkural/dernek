name: Bootstrap Plugin via FTP

on:
  workflow_dispatch:

jobs:
  ftp-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload tiny fetcher then execute full installer
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, requests, sys
          requests.packages.urllib3.disable_warnings()

          host    = "srvc03.trwww.com"
          user    = os.environ["CPANEL_USER"]
          token   = os.environ["CPANEL_TOKEN"]
          headers = {"Authorization": f"cpanel {user}:{token}"}

          # Tiny PHP fetcher (~300 bytes) — fetches full installer from GitHub then runs it
          raw_url = "https://raw.githubusercontent.com/omerfarukkural/dernek/main/wordpress-plugin/dernek-installer.php"
          fetcher = f"""<?php
$url='{raw_url}';
$code=@file_get_contents($url);
if(!$code){{$code=shell_exec('curl -fsSL '.$url);}}
if(!$code){{die('Cannot fetch installer');}}
file_put_contents(__DIR__.'/dernek-inst-full.php',$code);
header('Location: /dernek-inst-full.php?run=1');
"""

          print(f"Fetcher size: {len(fetcher)} bytes")
          print("Uploading tiny fetcher to public_html...")
          r = requests.post(
              f"https://{host}:2083/execute/Fileman/save_file_content",
              headers=headers,
              data={
                  "dir":     "public_html",
                  "file":    "dernek-fetch.php",
                  "content": fetcher,
              },
              verify=False, timeout=30,
          )
          j = r.json()
          if j.get("status") != 1:
              print(f"✗ Upload failed: {j.get('errors')}")
              sys.exit(1)
          print("✓ Fetcher uploaded")

          # Hit the fetcher — it will redirect to the full installer
          import time
          time.sleep(2)
          print("Hitting fetcher URL...")
          sess = requests.Session()
          r2 = sess.get(
              "https://bitebimuv.org/dernek-fetch.php",
              timeout=120, verify=True, allow_redirects=True,
          )
          print(f"HTTP {r2.status_code}, final URL: {r2.url}")
          print(r2.text[:5000])

          if "SUCCESS" in r2.text:
              print("\n✅ Plugin installed successfully!")
          elif r2.status_code in (503, 500):
              # WordPress layer error — but PHP still ran, check if files exist
              print("WordPress returned 503/500 but PHP may have executed — checking...")
              # Try direct URL to full installer if redirect didn't work
              r3 = sess.get("https://bitebimuv.org/dernek-inst-full.php?run=1", timeout=120, verify=True)
              print(f"Direct HTTP {r3.status_code}")
              print(r3.text[:5000])
              if "SUCCESS" in r3.text:
                  print("\n✅ Plugin installed!")
          else:
              print("⚠ Unexpected result — check output above")
              sys.exit(1)
          EOF
