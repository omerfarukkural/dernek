<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>AI Proje Takipci</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;width:320px;padding:16px;background:#f8f9fa;color:#202124}
    h2{font-size:15px;color:#1a73e8;margin-bottom:10px}
    #tool-badge{display:inline-block;background:#e8f0fe;color:#1a73e8;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;margin-bottom:12px}
    .tab{display:flex;gap:6px;margin-bottom:12px}
    .tab-btn{flex:1;padding:7px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;font-weight:500;transition:.15s}
    .tab-btn.active{background:#1a73e8;color:#fff;border-color:#1a73e8}
    .card{background:#fff;border-radius:8px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
    label{font-size:12px;color:#555;display:block;margin-top:10px;margin-bottom:4px}
    input,select{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px}
    .btn{width:100%;padding:10px;margin-top:10px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
    .btn-primary{background:#1a73e8;color:#fff}
    .btn-secondary{background:#e8f0fe;color:#1a73e8;margin-top:6px}
    .btn:hover{opacity:.88}
    #status,#s-status{margin-top:8px;font-size:12px;color:#43a047;text-align:center;min-height:16px}
    #s-status{color:#f44336}
    #s-status.ok{color:#43a047}
  </style>
</head>
<body>
  <h2>&#x1F916; AI Proje Takipci</h2>
  <div id="tool-badge">Sayfa algilaniyor...</div>
  <div class="tab">
    <button class="tab-btn active" onclick="tab('log')">Kayit</button>
    <button class="tab-btn" onclick="tab('settings')">Ayarlar</button>
  </div>
  <div id="plog">
    <div class="card">
      <label>Aktif Proje</label>
      <select id="sel"><option value="Genel">Genel</option></select>
      <label>Yeni Proje (opsiyonel)</label>
      <input id="newp" type="text" placeholder="Yeni proje adi...">
      <button class="btn btn-primary" onclick="send()">Simdi Kaydet</button>
      <button class="btn btn-secondary" onclick="reload()">Projeleri Yenile</button>
    </div>
    <div id="status"></div>
  </div>
  <div id="psettings" style="display:none">
    <div class="card">
      <label>Apps Script Web App URL</label>
      <input id="url" type="url" placeholder="https://script.google.com/macros/s/.../exec">
      <label>Webhook Secret Token</label>
      <input id="sec" type="password" placeholder="Gizli token">
      <button class="btn btn-primary" onclick="save()">Kaydet</button>
    </div>
    <div id="s-status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
